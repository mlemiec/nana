  extract_no_files: "No clippings found to extract."
  extract_wiki_created: "Created wiki page: {filename}"
  extract_done: "Extraction complete!"

  # Writer (Co-Writer)
  finish_start: "Nana is looking for incomplete notes..."
  finish_no_incomplete: "No #incomplete notes found. Good job!"
  finish_helping: "Helping finish {filename}..."
  finish_done_file: "Finished {filename}"
