  recipe_start: "Nana is looking through her old cookbooks..."
  recipe_enjoy: "Enjoy, dear! ✨👵"

model:
  empty_response: "Oh dear, my mind went blank! The model didn't send anything back. Try again in a moment, sweetheart. 👵"
