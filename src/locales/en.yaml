ui:
  welcome_title: "NANA CLI"
  welcome_subtitle: "Your Personal Knowledge Assistant"
  motto: |
    Hello dear! I'm [bold #d946ef]NANA[/bold #d946ef] ([bold #d946ef]NA[/bold #d946ef]na [bold #d946ef]N[/bold #d946ef]ot [bold #d946ef]A[/bold #d946ef]I).

    Think of me as your digital [italic cyan]Grandma[/italic cyan]. I'm here to help you learn new things, [bold green]correct your notes[/bold green], and [bold green]tidy up the place[/bold green] when it gets messy.

    I don't cook dinner yet, but check back soon
    [italic yellow]Anyway I'll share my recipes if you ask nicely! 👵✨[/italic yellow]
